{% extends 'base.html' %}
{% block titulo %}Eliminar Curso{% endblock %}
{% block contenido %}
<div class="alert alert-danger">
    <h4>¿Seguro que deseas eliminar el curso {{ curso.nombre }}?</h4>
    <form method="post">
        {% csrf_token %}
        <button type="submit" class="btn btn-danger">Sí, eliminar</button>
        <a href="{% url 'lista_cursos' %}" class="btn btn-secondary">Cancelar</a>
    </form>
</div>
{% endblock %}
