{% extends 'base.html' %}
{% block titulo %}{{ titulo }}{% endblock %}
{% block contenido %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card">
            <div class="card-header bg-primary text-white"><h4>{{ titulo }}</h4></div>
            <div class="card-body">
                <form method="post" enctype="multipart/form-data">
                    {% csrf_token %}
                    {% for campo in form %}
                    <div class="mb-3">
                        <label class="form-label">{{ campo.label }}</label>
                        {{ campo }}
                        {% for error in campo.errors %}<div class="text-danger small">{{ error }}</div>{% endfor %}
                    </div>
                    {% endfor %}
                    <button type="submit" class="btn btn-primary">Guardar</button>
                    <a href="{% url 'lista_docentes' %}" class="btn btn-secondary">Cancelar</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
