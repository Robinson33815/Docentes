{% extends 'base.html' %}
{% block titulo %}Eliminar Docente{% endblock %}
{% block contenido %}
<div class="alert alert-danger">
    <h4>¿Seguro que deseas eliminar a {{ docente.nombre }} {{ docente.apellido }}?</h4>
    <form method="post">
        {% csrf_token %}
        <button type="submit" class="btn btn-danger">Sí, eliminar</button>
        <a href="{% url 'lista_docentes' %}" class="btn btn-secondary">Cancelar</a>
    </form>
</div>
{% endblock %}
