<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block titulo %}Mi Sitio{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
         .foto-integrante {
             width: 100%;
             height: 200px;
             object-fit: cover;
             object-position: top;
         }
	 .foto-docente {
   	     width: 100%;
             height: 100%;
             min-height: 220px;
             object-fit: cover;
             object-position: top; 
         }
	 .foto-curso {
             width: 110px;
             height: 90px;
             object-fit: cover;
         }
	 .card {
   	     border: none;
             border-radius: 12px;
             transition: transform .2s, box-shadow .2s;
         }
         .card:hover {
             transform: translateY(-4px);
             box-shadow: 0 8px 20px rgba(0,0,0,.15) !important;
         } 
         .card-title {
             color: #1a3c6e;
         }
    </style>
</head>
<body class="bg-light">
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="/">SITIO DE OFERTA DE CURSOS UNEMI</a>
            <div class="navbar-nav">
		<a class="nav-link" href="/">🏠 Inicio</a>
                <a class="nav-link" href="/docentes/">👨‍🏫 Docentes</a>
                <a class="nav-link" href="/materias/">📚 Cursos</a>               
            </div>
        </div>
    </nav>
    <div class="container mt-4">
        {% block contenido %}{% endblock %}
    </div>
</body>
</html>
